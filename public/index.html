<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Disney Paris Planner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="rides-data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg: #0b0e18;
    --cd: #131827;
    --tx: #e2e8f0;
    --mu: #64748b;
    --ac: #6366f1;
    --ac-tx: #fff;
    --lnk: #6366f1;
    --bd: #1e293b;
    --dlp: #f472b6; --st: #60a5fa;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    color-scheme: dark;
  }
  html, body {
    font-family: 'DM Sans','Segoe UI',system-ui,sans-serif;
    background: var(--bg); color: var(--tx);
    min-height: 100vh; overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
  body.modal-open { overflow:hidden; overscroll-behavior:none; }
  .app { max-width: 520px; margin:0 auto; padding: 10px 14px 20px; }

  /* Header */
  .hdr { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; padding-top:2px; }
  .hdr-l { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .hdr-top { display:flex; align-items:baseline; gap:8px; min-width:0; }
  .hdr h1 { font-size:20px; font-weight:800; letter-spacing:0; min-width:0; }
  .hdr-r { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .live-mini { font-size:12px; color:var(--mu); white-space:nowrap; font-weight:700; }
  .sub-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--bd); background:var(--cd); color:var(--tx); font-size:16px; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; padding:0; }
  .sub-btn.on { background:color-mix(in srgb, var(--ac) 20%, var(--cd)); border-color:var(--ac); }

  /* Tabs */
  .tabs { display:flex; gap:2px; background:var(--cd); border-radius:12px; padding:3px; margin-bottom:12px; position:sticky; top:0; z-index:10; }
  .tb { flex:1; padding:11px 0; border:none; border-radius:10px; font-weight:700; font-size:14px; font-family:inherit; background:transparent; color:var(--mu); transition:all .15s; cursor:pointer; }
  .tb.on { background:var(--ac); color:var(--ac-tx); }

  /* Pills */
  .flt { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .pl { padding:7px 13px; border-radius:99px; font-size:13px; font-weight:600; border:1px solid var(--bd); background:transparent; color:var(--mu); font-family:inherit; white-space:nowrap; flex-shrink:0; cursor:pointer; transition:all .12s; }
  .pl.on { border-color:var(--ac); background:color-mix(in srgb, var(--ac) 15%, transparent); color:var(--ac-tx); }
  .pl.on-d { border-color:var(--dlp); background:rgba(244,114,176,.12); color:var(--dlp); }
  .pl.on-s { border-color:var(--st); background:rgba(96,165,250,.12); color:var(--st); }
  .wx-btn { display:inline-flex; align-items:center; gap:5px; min-height:32px; padding:6px 10px; border:1px solid var(--bd); border-radius:999px; background:var(--cd); color:var(--tx); cursor:pointer; font:inherit; flex-shrink:0; user-select:none; white-space:nowrap; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
  .wx-btn:active { background:color-mix(in srgb, var(--ac) 12%, var(--cd)); border-color:color-mix(in srgb, var(--ac) 35%, var(--bd)); }
  .wx { display:inline-flex; align-items:baseline; gap:5px; font-size:15px; line-height:1.1; color:var(--tx); flex-shrink:0; user-select:none; white-space:nowrap; }
  .wx .t { font-size:13px; font-weight:700; color:var(--tx); }
  .wmo { position:fixed; inset:0; z-index:40; display:flex; align-items:flex-end; justify-content:center; padding:calc(20px + var(--safe-top)) 12px calc(12px + var(--safe-bot)); background:rgba(3,6,12,.62); backdrop-filter:blur(8px); overflow:hidden; overscroll-behavior:none; touch-action:none; transition:background-color .22s ease, backdrop-filter .22s ease; }
  .wmc { width:min(520px,100%); max-height:min(calc(100vh - var(--safe-top) - var(--safe-bot) - 32px),760px); overflow:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(11,14,24,.98)); border:1px solid var(--bd); border-radius:18px; box-shadow:0 18px 60px rgba(0,0,0,.55); padding:14px 16px 12px; margin-top:auto; transition:transform .25s ease; will-change:transform; touch-action:pan-y; }
  .wmc.dragging { transition:none; }
  .wmh { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .wmtt { font-size:18px; font-weight:800; }
  .wmx { width:34px; height:34px; border:none; border-radius:50%; background:rgba(255,255,255,.06); color:var(--tx); font-size:22px; line-height:1; cursor:pointer; flex-shrink:0; }
  .wmbd { display:grid; gap:10px; }
  .wmday { display:flex; align-items:center; gap:8px; font-size:18px; font-weight:800; line-height:1.2; }
  .wmday .nav { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .wmday button { width:28px; height:28px; border:none; border-radius:50%; background:rgba(255,255,255,.06); color:var(--tx); font-size:16px; font-weight:800; cursor:pointer; flex-shrink:0; }
  .wmday .lb { min-width:0; }
  .wmday button:disabled { opacity:.35; cursor:default; }
  .wmsm { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
  .wmsm .it { padding:10px 11px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(148,163,184,.12); }
  .wmsm .lb { font-size:11px; font-weight:700; color:var(--mu); text-transform:uppercase; letter-spacing:.04em; }
  .wmsm .vl { font-size:17px; font-weight:800; margin-top:3px; }
  .wch { padding:6px 12px 4px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid rgba(148,163,184,.12); }
  .wch .tt { font-size:13px; font-weight:800; margin-bottom:2px; }
  .wch .sb { font-size:11px; color:var(--mu); margin-top:8px; }
  .wch.wx-cond { padding-top:2px; }
  /* Park section */
  .ps { margin-bottom:14px; }
  .psh { display:flex; align-items:center; gap:6px; padding-bottom:5px; margin-bottom:6px; }
  .psh.dlp { border-bottom:2px solid rgba(244,114,176,.15); }
  .psh.st { border-bottom:2px solid rgba(96,165,250,.15); }
  .psh .em { font-size:16px; }
  .psh .nm { font-weight:800; font-size:14px; }
  .psh.dlp .nm { color:var(--dlp); }
  .psh.st .nm { color:var(--st); }
  .psh .hr { font-size:11px; color:var(--mu); }

  /* Ride card — touch friendly */
  .rc { display:flex; align-items:center; gap:9px; padding:11px 10px; background:var(--cd); border-radius:10px; margin-bottom:6px; }
  .rc.dlp { border-left:3px solid var(--dlp); }
  .rc.st { border-left:3px solid var(--st); }
  .rc .ic { font-size:22px; line-height:1; flex-shrink:0; width:30px; text-align:center; }
  .rc .bd { flex:1; min-width:0; }
  .rc .hd { display:flex; align-items:flex-start; gap:6px; }
  .rc .hd .rn { flex:1; min-width:0; font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rc .rm { font-size:11px; color:var(--mu); margin-top:2px; display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .rc .tags { margin-top:6px; display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .rc .bh { font-size:11px; color:var(--mu); margin-top:6px; }
  .tier { font-size:10px; font-weight:800; padding:2px 6px; border-radius:3px; white-space:nowrap; letter-spacing:0; }
  .t-S { background:#8b5cf6; color:#fff; }
  .t-A { background:#a78bfa; color:#fff; }
  .t-B { background:#c4b5fd; color:#2e1065; }
  .t-C { background:#94a3b8; color:#1e293b; }
  .lv { font-size:12px; font-weight:700; padding:3px 8px; border-radius:99px; }
  .lv-off { background:#334155; color:#94a3b8; font-size:11px; }
  .bh .cmp { font-weight:700; }
  .cmp-good { color:#22c55e; }
  .cmp-mid { color:#eab308; }
  .cmp-bad { color:#f97316; }
  .cmp-low { color:var(--mu); }
  .tg-s { background:#164e63; color:#a5f3fc; }
  .tg-p { color:#fbbf24; font-weight:700; font-size:11px; }
  .tg-p.so { color:#94a3b8; font-weight:600; }

  /* Legend */
  .lgd { padding:9px; background:var(--cd); border-radius:8px; display:flex; gap:9px; flex-wrap:wrap; font-size:11px; color:var(--mu); margin-top:6px; }
  .lgd .d { width:10px; height:10px; border-radius:2px; display:inline-block; vertical-align:middle; margin-right:2px; }

  /* Heatmap */
  .hm-w { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -14px; padding:0 14px; }
  .hm-i { min-width:560px; }
  .hm-h { display:flex; gap:1px; margin-bottom:2px; }
  .hm-h .l { width:110px; flex-shrink:0; }
  .hm-h .h { flex:1; font-size:9px; text-align:center; color:var(--mu); min-width:24px; }
  .hm-st { font-size:11px; font-weight:700; padding:4px 0; }
  .hm-st.dlp { color:var(--dlp); border-bottom:1px solid rgba(244,114,176,.15); }
  .hm-st.st { color:var(--st); border-bottom:1px solid rgba(96,165,250,.15); }
  .hm-r { display:flex; align-items:center; gap:1px; padding:1px 0; }
  .hm-r .l { width:124px; font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
  .hm-r .l .nm { display:block; overflow:hidden; text-overflow:ellipsis; }
  .hm-r .l .pr { display:block; font-size:10px; color:#fbbf24; font-weight:700; line-height:1.1; }
  .hm-r .l .pr.so { color:#94a3b8; font-weight:600; }
  .hm-r .c { flex:1; height:30px; min-width:24px; border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; line-height:1; }
  .hm-r .c.na { background:#334155 !important; color:#94a3b8 !important; }
  .hm-ins { margin-top:8px; padding:11px; background:var(--cd); border-radius:10px; font-size:12px; color:var(--mu); line-height:1.6; }

  /* Plan */
  .stb { width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--bd); background:var(--cd); color:var(--tx); text-align:left; margin-bottom:5px; font-family:inherit; cursor:pointer; transition:all .12s; }
  .stb.on { border-color:var(--ac); background:color-mix(in srgb, var(--ac) 8%, transparent); }
  .stb .inn { display:flex; align-items:center; gap:6px; }
  .stb .em { font-size:18px; }
  .stb .tt { font-weight:700; font-size:14px; }
  .stb .ss { font-size:11px; color:var(--mu); margin-top:1px; }
  .stb .ck { margin-left:auto; color:var(--ac); font-weight:800; font-size:14px; }

  .pbn { padding:10px 12px; margin:12px 0; border-radius:12px; background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7); color:#fff; }
  .pbn .tt { font-size:15px; font-weight:800; }
  .pbn .st { font-size:12px; margin-top:3px; opacity:.85; }

  .bl { padding:10px 12px; background:var(--cd); border-radius:10px; margin-bottom:6px; }
  .bl.tr { padding:7px 10px; background:transparent; border:1px dashed #475569; }
  .bl.d { border-left:3px solid var(--dlp); }
  .bl.s { border-left:3px solid var(--st); }
  .bl-h { display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:5px; }
  .bl-h .lf { display:flex; align-items:center; gap:6px; }
  .bl-h .ic { font-size:18px; }
  .bl-h .ti { font-size:12px; }
  .bl-lb { font-weight:700; font-size:14px; }
  .bl-tm { font-size:12px; color:var(--mu); }
  .bl-rd { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
  .bl-tg { font-size:11px; padding:3px 7px; border-radius:4px; font-weight:600; }
  .bl-nt { font-size:12px; color:var(--mu); line-height:1.45; }
  .pbdg { font-size:11px; padding:3px 8px; border-radius:99px; font-weight:700; white-space:nowrap; }
  .pbdg.d { background:rgba(244,114,176,.12); color:var(--dlp); border:1px solid rgba(244,114,176,.2); }
  .pbdg.s { background:rgba(96,165,250,.12); color:var(--st); border:1px solid rgba(96,165,250,.2); }

  .tips { margin-top:14px; padding:12px; background:var(--cd); border-radius:10px; }
  .tips h3 { font-size:14px; font-weight:700; margin-bottom:6px; }
  .tips p { font-size:12px; color:var(--mu); line-height:1.6; }
  .tips b { color:var(--tx); }

  /* Map view */
  .mv-wrap { position:relative; width:100%; height:calc(100vh - 220px - var(--safe-top) - var(--safe-bot)); min-height:320px; border-radius:10px; overflow:hidden; background:#a3bf5d; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; margin-bottom:32px; }
  .tm-viewport { position:absolute; left:-50%; top:-50%; width:200%; height:200%; transform-origin:50% 50%; will-change:transform; }
  .tm-tiles { position:absolute; inset:0; overflow:hidden; }
  .tm-layer { position:absolute; inset:0; }
  .tm-overlay { position:absolute; inset:0; pointer-events:auto; }
  .tm-marker-layer, .tm-user-layer, .tm-popup-layer { position:absolute; inset:0; }
  .tm-user-layer { pointer-events:none; }
  .tm-popup-layer { pointer-events:none; }
  .tm-popup-layer .mv-popup { pointer-events:auto; }
  .tm-tile { position:absolute; width:512px; height:512px; object-fit:cover; image-rendering:auto; }
  .tm-pt { position:absolute; transform:translate(-50%,-50%); font-size:10px; line-height:1; cursor:pointer; background:transparent; }
  .tm-pt .body { width:100%; height:100%; box-sizing:border-box; border-radius:9999px; border:2px solid #fff; box-shadow:0 0 0 1.5px #000, 0 1px 3px rgba(0,0,0,.5); overflow:hidden; display:flex; flex-direction:row; align-items:center; justify-content:center; gap:0.15em; padding:0 0.35em; }
  .tm-pt.sel .body { box-shadow:0 0 0 1.5px #000, 0 0 0 4px var(--ac); }
  .tm-pt.sel { z-index:7; }
  .tm-pt .rt { font-weight:800; font-size:0.85em; letter-spacing:-0.02em; flex:0 0 auto; }
  .tm-pt .ic { font-size:1.25em; line-height:1; flex:0 0 auto; }
  .tm-pt .ic.glow { filter:drop-shadow(1px 0 0 #fff) drop-shadow(-1px 0 0 #fff) drop-shadow(0 1px 0 #fff) drop-shadow(0 -1px 0 #fff); }
  .tm-pt.t-S .body { background:#8b5cf6; color:#fff; }
  .tm-pt.t-A .body { background:#a78bfa; color:#fff; }
  .tm-pt.t-B .body { background:#c4b5fd; color:#2e1065; }
  .tm-pt.t-C .body { background:#94a3b8; color:#1e293b; }
  .tm-zoom { position:absolute; right:8px; bottom:8px; display:flex; flex-direction:column; gap:4px; z-index:4; }
  .tm-zoom button { width:34px; height:34px; border-radius:8px; border:none; background:rgba(0,0,0,.65); color:#fff; font-size:18px; font-weight:700; cursor:pointer; }
  .tm-compass { position:absolute; left:8px; top:8px; width:40px; height:40px; border-radius:50%; border:none; background:rgba(0,0,0,.65); color:#fff; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; z-index:5; box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .tm-compass svg { width:24px; height:24px; transition:transform .25s ease; display:block; }
  .tm-compass .n { fill:#ef4444; }
  .tm-compass .s { fill:#e2e8f0; }
  .mv-scene { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
  .mv-img { display:block; width:100%; height:auto; -webkit-user-drag:none; pointer-events:none; }
  .mv-pt { position:absolute; width:26px; height:26px; border-radius:50%; border:2px solid #fff; transform:translate(-50%,-50%); box-shadow:0 0 0 1.5px #000, 0 2px 4px rgba(0,0,0,.5); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; line-height:1; }
  .mv-pt.t-S { background:#8b5cf6; }
  .mv-pt.t-A { background:#a78bfa; }
  .mv-pt.t-B { background:#c4b5fd; }
  .mv-pt.t-C { background:#94a3b8; }
  .mv-pt.dim { opacity:.2; pointer-events:none; }
  .mv-pt.sel { box-shadow:0 0 0 1.5px #000, 0 0 0 4px var(--ac); z-index:2; }
  .mv-wt { position:absolute; left:50%; top:100%; transform:translate(-30%,-40%); min-width:26px; height:20px; padding:0 6px; border-radius:10px; border:1.5px solid #000; font-size:12px; font-weight:800; line-height:1; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.5); white-space:nowrap; }
  .mv-wt.off { background:#334155; color:#94a3b8; }
  .mv-zoom { position:absolute; right:8px; bottom:8px; display:flex; flex-direction:column; gap:4px; z-index:3; }
  .mv-zoom button { width:34px; height:34px; border-radius:8px; border:none; background:rgba(0,0,0,.65); color:#fff; font-size:18px; font-weight:700; cursor:pointer; }
  .mv-legend { position:absolute; left:8px; top:8px; padding:5px 8px; background:rgba(0,0,0,.55); color:#fff; border-radius:6px; font-size:10px; display:flex; gap:6px; flex-wrap:wrap; z-index:3; }
  .mv-legend .d { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; vertical-align:middle; }
  .mv-tools { position:absolute; right:8px; top:8px; display:flex; gap:6px; z-index:3; }
  .mv-tool { padding:7px 10px; border-radius:8px; border:none; background:rgba(0,0,0,.65); color:#fff; font:inherit; font-size:12px; font-weight:700; cursor:pointer; }
  .mv-popup { position:absolute; width:280px; max-width:calc(100% - 16px); padding:12px 14px; background:var(--cd); border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,.55); z-index:10; border:1px solid var(--bd); pointer-events:auto; }
  .mv-popup .cl { position:absolute; top:4px; right:6px; width:30px; height:30px; border-radius:50%; border:none; background:transparent; color:var(--mu); font-size:22px; cursor:pointer; line-height:1; }
  .mv-popup .tp { display:flex; align-items:center; gap:10px; margin-bottom:6px; padding-right:28px; }
  .mv-popup .tp .em { font-size:26px; }
  .mv-popup .tp .nm { font-weight:800; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mv-popup .sb { font-size:12px; color:var(--mu); display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; line-height:1.4; }
  .mv-popup .rw { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .mv-popup .bh { font-size:12px; color:var(--mu); margin-top:8px; line-height:1.5; }
  .mv-popup .ar { position:absolute; width:10px; height:10px; background:var(--cd); border:1px solid var(--bd); transform:rotate(45deg); }
  .mv-popup.up .ar { bottom:-6px; border-top:none; border-left:none; }
  .mv-popup.down .ar { top:-6px; border-bottom:none; border-right:none; }

  .usr-pt { position:absolute; width:18px; height:18px; border-radius:50%; background:#3b82f6; border:3px solid #fff; transform:translate(-50%,-50%); box-shadow:0 0 0 2px rgba(59,130,246,.35), 0 0 0 8px rgba(59,130,246,.18); animation:usrPulse 1.4s ease-in-out infinite; }
  .usr-arrow { position:absolute; width:48px; height:48px; transform-origin:50% 50%; pointer-events:none; z-index:6; filter:drop-shadow(0 0 4px rgba(30,64,175,.95)); }
  .usr-arrow .shaft { stroke:#93c5fd; stroke-width:4.5; stroke-linecap:round; fill:none; }
  .usr-arrow .head { fill:#93c5fd; opacity:.95; }
  @keyframes usrPulse {
    0% { box-shadow:0 0 0 2px rgba(59,130,246,.38), 0 0 0 8px rgba(59,130,246,.18); }
    50% { box-shadow:0 0 0 3px rgba(59,130,246,.50), 0 0 0 15px rgba(59,130,246,.28); }
    100% { box-shadow:0 0 0 2px rgba(59,130,246,.38), 0 0 0 8px rgba(59,130,246,.18); }
  }

  /* Pull to refresh */
  .ptr { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--mu); font-weight:700; pointer-events:none; z-index:30; padding-top:var(--safe-top); transition:transform .2s; transform:translateY(-60px); }
  .ptr.act { transition:none; }
  .ptr .ic { display:inline-block; margin-right:6px; transition:transform .2s; }
  .ptr.rdy .ic { transform:rotate(180deg); }
  .ptr.spn .ic { animation:ptr-spin .8s linear infinite; }
  @keyframes ptr-spin { to { transform:rotate(360deg) } }

const weatherHourLabel=s=>{

function tzOffsetMinutes(timeZone,date){
  const parts=new Intl.DateTimeFormat("en-US",{timeZone,timeZoneName:"shortOffset",hour:"2-digit"}).formatToParts(date);
  const tz=parts.find(p=>p.type==="timeZoneName")?.value||"GMT";
  const m=/GMT([+-])(\d{1,2})(?::?(\d{2}))?/.exec(tz);
  if(!m)return 0;
  const sign=m[1]==="-"?-1:1;
  return sign*((+m[2])*60+(+(m[3]||0)));
}
function weatherUtcDate(s){
  const p=weatherLocalParts(s);
  if(!p)return null;
  const guessUtc=Date.UTC(p.year,p.month-1,p.day,p.hour,p.minute);
  const offset=tzOffsetMinutes("Europe/Paris",new Date(guessUtc));
  return new Date(guessUtc-offset*60000);

const weatherObservedHour=s=>{

function weatherNowMarkerX(hours, observedAt, width, padX){
  if(!hours.length || !observedAt) return null;
  const nowTs=weatherTs(observedAt);
  if(nowTs==null)return null;
  const points=hours.map(h=>weatherTs(h.time));
  if(points.some(ts=>ts==null))return null;
  const plotW=width-padX*2;
  if(points.length===1)return padX+plotW/2;
  if(nowTs<points[0]||nowTs>points[points.length-1])return null;
  for(let i=0;i<points.length-1;i++){
    const a=points[i], b=points[i+1];
    if(nowTs<a||nowTs>b)continue;
    const k=b===a?0:(nowTs-a)/(b-a);
    const x0=padX+(i*plotW)/Math.max(1,hours.length-1);
    const x1=padX+((i+1)*plotW)/Math.max(1,hours.length-1);
    return x0+(x1-x0)*k;
  }
  return padX+((points.length-1)*plotW)/Math.max(1,hours.length-1);
}

function renderTempChart(hours){

  const labels=hours.filter((_,i)=>i%3===0||i===hours.length-1).map((h,i)=>{

  }).join("");

function clamp(v,min,max){ return Math.min(max,Math.max(min,v)); }

function worldSize(zoom){
  return TILE_SIZE * (2 ** zoom);
}

function projectLatLng(lat,lng,zoom){
  const size = worldSize(zoom);
  const x = ((lng + 180) / 360) * size;
  const siny = clamp(Math.sin((lat * Math.PI) / 180), -0.9999, 0.9999);
  const y = (0.5 - Math.log((1 + siny) / (1 - siny)) / (4 * Math.PI)) * size;
  return { x, y };
}

function unprojectWorld(x,y,zoom){
  const size = worldSize(zoom);
  const lng = (x / size) * 360 - 180;
  const n = Math.PI - (2 * Math.PI * y) / size;
  const lat = (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
  return { lat, lng };
}

function screenToMapDelta(dx, dy){
  const r = (-(TILE_MAP.rotation || 0) * Math.PI) / 180;
  const cos = Math.cos(r), sin = Math.sin(r);
  return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
}

function wrapX(x, zoom){
  const max = 2 ** zoom;
  return ((x % max) + max) % max;
}

function clampCenterToCrop(){
  const crop = S.cropBounds && S.cropBounds.bounds;
  const wrap = document.getElementById("mv-wrap");
  if(!crop || !wrap) return;
  const z = TILE_MAP.zoom;
  const vw = wrap.clientWidth;
  const vh = wrap.clientHeight;
  if(!vw || !vh) return;

  const westX = projectLatLng(0, crop.west, z).x;
  const eastX = projectLatLng(0, crop.east, z).x;
  const northY = projectLatLng(crop.north, 0, z).y;
  const southY = projectLatLng(crop.south, 0, z).y;

  const minCenterX = westX + vw / 2;
  const maxCenterX = eastX - vw / 2;
  const minCenterY = northY + vh / 2;
  const maxCenterY = southY - vh / 2;

  const center = projectLatLng(TILE_MAP.center.lat, TILE_MAP.center.lng, z);
  let nextCenterX;
  let nextCenterY;

  if(minCenterX > maxCenterX) nextCenterX = (westX + eastX) / 2;
  else nextCenterX = clamp(center.x, minCenterX, maxCenterX);

  if(minCenterY > maxCenterY) nextCenterY = (northY + southY) / 2;
  else nextCenterY = clamp(center.y, minCenterY, maxCenterY);

  TILE_MAP.center = unprojectWorld(nextCenterX, nextCenterY, z);
}

function isPointInCropBounds(lat,lng){
  const crop = S.cropBounds && S.cropBounds.bounds;
  if(!crop) return true;
  return lat <= crop.north && lat >= crop.south && lng >= crop.west && lng <= crop.east;
}

    }

    set({ userHeading: Math.round(h * 10) / 10 }, { silent: true });

  if(Number.isFinite(coord.mx) && Number.isFinite(coord.my)){
    const cacheKey = `${coord.mx}:${coord.my}`;
    let geo = LEGACY_GEO_CACHE.get(cacheKey);
    if(!geo){

      if(geo) LEGACY_GEO_CACHE.set(cacheKey, geo);

function clearPreviousTiles(){

    clearTimeout(TILE_DOM.cleanupTimer);
    TILE_DOM.cleanupTimer = 0;

  TILE_DOM.transitionToken += 1;
  if(TILE_DOM.previousLayer) TILE_DOM.previousLayer.replaceChildren();

function queuePreviousTileCleanup(){
  if(!TILE_DOM.previousLayer || !TILE_DOM.previousLayer.childElementCount) return;
  if(TILE_DOM.cleanupTimer){
    clearTimeout(TILE_DOM.cleanupTimer);
    TILE_DOM.cleanupTimer = 0;
  }
  const token = ++TILE_DOM.transitionToken;
  let done = false;
  const finish = ()=>{
    if(done || token !== TILE_DOM.transitionToken) return;
    done = true;
    if(TILE_DOM.cleanupTimer){
      clearTimeout(TILE_DOM.cleanupTimer);
      TILE_DOM.cleanupTimer = 0;
    }
    if(TILE_DOM.previousLayer) TILE_DOM.previousLayer.replaceChildren();
  };
  const imgs = [...TILE_DOM.currentLayer.querySelectorAll("img")];
  if(!imgs.length){
    finish();
    return;
  }
  const waitCount = Math.min(TILE_TRANSITION_WAIT_COUNT, imgs.length);
  let pending = waitCount;
  const onReady = ()=>{
    pending -= 1;
    if(pending <= 0) finish();
  };
  for(let i = 0; i < waitCount; i += 1){
    const img = imgs[i];
    if(img.complete) onReady();
    else{
      img.addEventListener("load", onReady, { once: true });
      img.addEventListener("error", onReady, { once: true });
    }
  }
  TILE_DOM.cleanupTimer = setTimeout(finish, TILE_TRANSITION_TIMEOUT_MS);
}

function moveCurrentTilesToPrevious(){

  clearPreviousTiles();
  if(!TILE_DOM.currentLayer.childElementCount) return;

  TILE_DOM.cache.clear();
  TILE_DOM.currentRangeKey = "";
}

function applyTilePosition(img, left, top, size){
  const leftPx = `${left}px`;
  const topPx = `${top}px`;
  const sizePx = `${size}px`;
  if(img.style.left !== leftPx) img.style.left = leftPx;
  if(img.style.top !== topPx) img.style.top = topPx;
  if(img.style.width !== sizePx) img.style.width = sizePx;
  if(img.style.height !== sizePx) img.style.height = sizePx;
}

function makeTileImage(desc){
  const img = document.createElement("img");
  img.className = "tm-tile";
  img.loading = "eager";
  img.decoding = "async";
  img.alt = "";
  img.onerror = function(){ this.style.display = "none"; };
  img.dataset.key = desc.key;
  img.dataset.tx = String(desc.tx);
  img.dataset.ty = String(desc.ty);
  img.dataset.src = desc.src;
  img.src = desc.src;
  img.style.display = "";
  applyTilePosition(img, desc.left, desc.top, desc.size);
  return img;
}

function syncTiles(descriptors){
  const keep = new Set();
  const fragment = document.createDocumentFragment();
  for(const desc of descriptors){
    keep.add(desc.key);
    let img = TILE_DOM.cache.get(desc.key);
    if(!img){
      img = makeTileImage(desc);
      TILE_DOM.cache.set(desc.key, img);
      fragment.appendChild(img);
    } else {
      img.style.display = "";
      if(img.dataset.src !== desc.src){
        img.dataset.src = desc.src;
        img.src = desc.src;
      }
      img.dataset.tx = String(desc.tx);
      img.dataset.ty = String(desc.ty);
      applyTilePosition(img, desc.left, desc.top, desc.size);
    }
  }
  if(fragment.childNodes.length) TILE_DOM.currentLayer.appendChild(fragment);
  for(const [key, img] of TILE_DOM.cache){
    if(keep.has(key)) continue;
    img.remove();
    TILE_DOM.cache.delete(key);
  }
}

function updateCurrentTilePositions(topLeftX, topLeftY, visualScale){
  const size = TILE_SIZE * visualScale;
  for(const img of TILE_DOM.cache.values()){
    const tx = Number(img.dataset.tx);
    const ty = Number(img.dataset.ty);
    applyTilePosition(img, tx * TILE_SIZE * visualScale - topLeftX, ty * TILE_SIZE * visualScale - topLeftY, size);
    img.style.display = "";
  }
}

      text: "✕"
    };
  }
  const w = lv.wait_time;
  return {
    className: "mv-wt",
    style: `top:calc(100% + ${badgeOffset}px);transform:translate(-30%,0);background:${wc(w)};color:${w > 40 ? "#fff" : "#0f172a"}`,
    text: `${w === 0 ? "0" : w}${slv && slv.is_open ? `/${singleWaitText(slv.wait_time)}` : ""}`
  };
}

function ensureMarkerBadge(el){
  if(el._badgeEl) return el._badgeEl;
  const badge = document.createElement("span");
  el._badgeEl = badge;
  el.appendChild(badge);
  return badge;
}

function syncMarkerNode(el, marker, counterRotate){
  const { name, meta, px, py, markerSize, markerFont, pillW, waitBadge, selected } = marker;
  const transform = counterRotate ? `translate(-50%,-50%) ${counterRotate}` : "translate(-50%,-50%)";
  const iconClass = meta.noGlow ? "ic" : "ic glow";
  el.className = `tm-pt t-${meta.t}${selected ? " sel" : ""}`;
  el.dataset.ride = name;
  el.title = name;
  if(el.style.left !== `${px}px`) el.style.left = `${px}px`;
  if(el.style.top !== `${py}px`) el.style.top = `${py}px`;
  if(el.style.width !== `${pillW}px`) el.style.width = `${pillW}px`;
  if(el.style.height !== `${markerSize}px`) el.style.height = `${markerSize}px`;
  if(el.style.fontSize !== `${markerFont}px`) el.style.fontSize = `${markerFont}px`;
  if(el.style.transform !== transform) el.style.transform = transform;
  if(el._rt.textContent !== TIER_STARS[meta.t]) el._rt.textContent = TIER_STARS[meta.t];
  if(el._ic.className !== iconClass) el._ic.className = iconClass;
  if(el._ic.textContent !== meta.i) el._ic.textContent = meta.i;
  if(waitBadge){
    const badge = ensureMarkerBadge(el);
    if(badge.className !== waitBadge.className) badge.className = waitBadge.className;
    if(badge.getAttribute("style") !== waitBadge.style) badge.setAttribute("style", waitBadge.style);
    if(badge.textContent !== waitBadge.text) badge.textContent = waitBadge.text;
  } else if(el._badgeEl){
    el._badgeEl.remove();
    el._badgeEl = null;
  }
}

function makeMarkerNode(marker, counterRotate){
  const el = document.createElement("div");
  el.innerHTML = `<div class="body"><span class="rt"></span><span class="ic"></span></div>`;
  el._rt = el.querySelector(".rt");
  el._ic = el.querySelector(".ic");
  syncMarkerNode(el, marker, counterRotate);
  return el;
}

function syncMarkers(markers, counterRotate){
  const keep = new Set();
  const fragment = document.createDocumentFragment();
  for(const marker of markers){
    keep.add(marker.name);
    let el = OVERLAY_DOM.markerCache.get(marker.name);
    if(!el){
      el = makeMarkerNode(marker, counterRotate);
      OVERLAY_DOM.markerCache.set(marker.name, el);
      fragment.appendChild(el);
    } else {
      syncMarkerNode(el, marker, counterRotate);
    }
  }
  if(fragment.childNodes.length) OVERLAY_DOM.markerLayer.appendChild(fragment);
  for(const [name, el] of OVERLAY_DOM.markerCache){
    if(keep.has(name)) continue;
    el.remove();
    OVERLAY_DOM.markerCache.delete(name);
  }
}

function ensureUserMarkerDom(){
  if(!OVERLAY_DOM.userLayer) return false;
  if(!OVERLAY_DOM.userArrow){
    const arrow = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    arrow.setAttribute("class", "usr-arrow");

    dot.style.display = "none";

    OVERLAY_DOM.userDot = dot;

}

function syncUserMarker(userState, counterRotate){

}

function getTileGestureRect(wrap){
  if(tilePanStart && tilePanStart.rect) return tilePanStart.rect;
  const rect = wrap.getBoundingClientRect();
  if(tilePanStart) tilePanStart.rect = rect;
  return rect;
}

function renderTileMap(){
  clampCenterToCrop();
  const wrap = document.getElementById("mv-wrap");
  const layer = document.getElementById("tm-tiles");
  const overlay = document.getElementById("tm-overlay");
  const viewport = wrap?.querySelector(".tm-viewport");
  if(!wrap || !layer || !overlay || !viewport) return;
  ensureTileDom(layer);
  ensureOverlayDom(overlay);
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const visibleMinX = (vw - wrap.clientWidth) / 2;
  const visibleMaxX = visibleMinX + wrap.clientWidth;
  const visibleMinY = (vh - wrap.clientHeight) / 2;
  const visibleMaxY = visibleMinY + wrap.clientHeight;
  const zoom = TILE_MAP.zoom;
  const dpr = Math.max(1, Math.round(window.devicePixelRatio || 1));
  const dprBoost = Math.max(0, Math.round(Math.log2(dpr)));
  const tileZoomCap = TILE_MAP.maxTileZoom ?? TILE_MAP.maxZoom;
  const tileZoom = clamp(Math.floor(zoom) + dprBoost, TILE_MAP.minZoom, tileZoomCap);
  const scale = 2 ** tileZoom;
  const visualScale = 2 ** (zoom - tileZoom);
  const centerWorld = projectLatLng(TILE_MAP.center.lat, TILE_MAP.center.lng, zoom);
  const topLeftX = centerWorld.x - vw / 2;
  const topLeftY = centerWorld.y - vh / 2;
  const topLeftBaseX = topLeftX / visualScale;
  const topLeftBaseY = topLeftY / visualScale;
  const tileMinX = Math.floor(topLeftBaseX / TILE_SIZE);
  const tileMaxX = Math.floor((topLeftBaseX + vw / visualScale) / TILE_SIZE);
  const tileMinY = Math.floor(topLeftBaseY / TILE_SIZE);
  const tileMaxY = Math.floor((topLeftBaseY + vh / visualScale) / TILE_SIZE);
  const crop = S.cropBounds && S.cropBounds.bounds;
  let renderMinX = tileMinX - TILE_OVERSCAN;
  let renderMaxX = tileMaxX + TILE_OVERSCAN;
  let renderMinY = tileMinY - TILE_OVERSCAN;
  let renderMaxY = tileMaxY + TILE_OVERSCAN;
  if(crop){
    const westPx = projectLatLng(0, crop.west, tileZoom).x;
    const eastPx = projectLatLng(0, crop.east, tileZoom).x;
    const northPx = projectLatLng(crop.north, 0, tileZoom).y;
    const southPx = projectLatLng(crop.south, 0, tileZoom).y;
    const cropMinX = Math.floor(westPx / TILE_SIZE);
    const cropMaxX = Math.floor(eastPx / TILE_SIZE);
    const cropMinY = Math.floor(northPx / TILE_SIZE);
    const cropMaxY = Math.floor(southPx / TILE_SIZE);
    renderMinX = Math.max(renderMinX, cropMinX);
    renderMaxX = Math.min(renderMaxX, cropMaxX);
    renderMinY = Math.max(renderMinY, cropMinY);
    renderMaxY = Math.min(renderMaxY, cropMaxY);
  }
  const tileRangeKey = `${tileZoom}:${renderMinX}:${renderMaxX}:${renderMinY}:${renderMaxY}`;
  const canReuseTileSet = TILE_DOM.currentZoom === tileZoom && TILE_DOM.currentRangeKey === tileRangeKey && TILE_DOM.cache.size;
  if(TILE_DOM.currentZoom !== null && TILE_DOM.currentZoom !== tileZoom){
    moveCurrentTilesToPrevious();
  }
  TILE_DOM.currentZoom = tileZoom;
  if(canReuseTileSet){
    updateCurrentTilePositions(topLeftX, topLeftY, visualScale);
  } else {
    const descriptors = [];
    const size = TILE_SIZE * visualScale;
    for(let ty = renderMinY; ty <= renderMaxY; ty++){
      if(ty < 0 || ty >= scale) continue;
      for(let tx = renderMinX; tx <= renderMaxX; tx++){
        const wrappedX = wrapX(tx, tileZoom);
        descriptors.push({
          key: `${tileZoom}/${tx}/${ty}`,
          src: `tiles/${tileZoom}/${wrappedX}/${ty}.jpg`,
          tx,
          ty,
          left: tx * TILE_SIZE * visualScale - topLeftX,
          top: ty * TILE_SIZE * visualScale - topLeftY,
          size
        });
      }
    }
    syncTiles(descriptors);
    TILE_DOM.currentRangeKey = tileRangeKey;
    if(TILE_DOM.previousLayer && TILE_DOM.previousLayer.childElementCount) queuePreviousTileCleanup();
  }

  if(TILE_MAP.isPanning) return;

  const minStars = tierMinStars(S.mrt);
  const zoomNorm = (zoom - TILE_MAP.minZoom) / Math.max(1, TILE_MAP.maxZoom - TILE_MAP.minZoom);
  const markerSize = Math.round(30 + zoomNorm * 18); // 30..48 px
  const markerFont = Math.round(15 + zoomNorm * 9);  // 15..24 px
  const pillW = Math.round(markerSize * 1.55);
  const badgeOffset = -Math.max(4, Math.round(markerSize * 0.18));
  const counterRotate = TILE_MAP.rotation ? `rotate(${-TILE_MAP.rotation}deg)` : "";
  const markerDescriptors = [];
  for(const { name, meta, geo } of getMapMarkerEntries()){
    if(S.pf !== "all" && meta.p !== S.pf) continue;
    if(TIER_STARS[meta.t] < minStars) continue;

    const world = projectLatLng(geo.lat, geo.lng, zoom);
    const px = world.x - topLeftX;
    const py = world.y - topLeftY;
    if(px < -20 || px > vw + 20 || py < -20 || py > vh + 20) continue;
    const lv = liveRide(name, meta);
    const slv = singleRide(name, meta);
    markerDescriptors.push({
      name,
      meta,
      px,
      py,
      markerSize,
      markerFont,
      pillW,
      waitBadge: buildWaitBadgeState(lv, slv, badgeOffset),
      selected: S.msel === name
    });
  }
  syncMarkers(markerDescriptors, counterRotate);

  let userState = null;
  if(S.userPos && Number.isFinite(S.userPos.lat) && Number.isFinite(S.userPos.lng) && S.userPosAt && Date.now()-S.userPosAt<USER_POS_TTL_MS){
    const wp = projectLatLng(S.userPos.lat, S.userPos.lng, zoom);
    const ux = wp.x - topLeftX;
    const uy = wp.y - topLeftY;
    if(ux >= -24 && ux <= vw + 24 && uy >= -24 && uy <= vh + 24){
      userState = { x: ux, y: uy, heading: S.userHeading };
    }
  }
  syncUserMarker(userState, counterRotate);

  let popupState = null;
  if(S.msel && R[S.msel]){
    const n=S.msel, m=R[n];
    const geo=rideGeoByName(n);
    if(geo){
      const world = projectLatLng(geo.lat, geo.lng, zoom);
      const px = world.x - topLeftX;
      const py = world.y - topLeftY;
      if(px >= -40 && px <= vw + 40 && py >= -40 && py <= vh + 40){
        const lv=liveRide(n,m);
        const slv=singleRide(n,m);
        const paid=paidRide(n,m);
        let badge='';
        if(S.ld)badge='<span class="lv lv-off">⏳ ждём live</span>';
        else if(!lv)badge='<span class="lv lv-off">нет live</span>';
        else if(!lv.is_open)badge='<span class="lv lv-off">Закрыт</span>';
        else{const w=lv.wait_time;badge=`<span class="lv" style="background:${wc(w)};color:${w>40?'#fff':'#0f172a'}">${w===0?'walk-on':`${w} мин`}</span>`}
        const singleBadge=slv&&slv.is_open?`<span class="lv tg-s">В одиночку: ${singleWaitText(slv.wait_time)} мин</span>`:'';
        const fastTag=hasPremierAccess(n,m)?`<span class="tg-p${paid&&!paid.available?' so':''}">${paidFull(paid)}</span>`:'';
        const popupW=Math.min(280, wrap.clientWidth-16);
        const popupH=170;
        const gap=16;
        const flipUp=py+gap+popupH>visibleMaxY-8;
        const top=flipUp
          ? Math.max(visibleMinY+8, py-gap-popupH)
          : Math.min(visibleMaxY-popupH-8, py+gap);
        const left=Math.min(visibleMaxX-popupW-8, Math.max(visibleMinX+8, px-popupW/2));
        const ax=Math.min(popupW-14,Math.max(4,px-left-5));
        popupState = {
          flipUp,
          left,
          top,
          width: popupW,
          arrowX: ax,
          icon: m.i,
          name: n,
          park: `${P[m.p].e} ${P[m.p].s}`,
          land: m.l,
          type: m.tp,
          tier: m.t,
          stars: T[m.t].stars,
          fastTag,
          badge,
          singleBadge,
          baseText: baseText(m,lv)
        };
      }
    }
  }
  syncPopup(popupState, counterRotate);

  viewport.style.transform = TILE_MAP.rotation ? `rotate(${TILE_MAP.rotation}deg)` : "";
  updateCompass();
}

function updateCompass(){
  const btn = document.getElementById("tm-compass");
  if(!btn) return;
  const rot = TILE_MAP.rotation;
  btn.style.display = rot ? "flex" : "none";
  const arrow = btn.querySelector("svg");
  if(arrow) arrow.style.transform = `rotate(${-rot}deg)`;
}

function setMapRotation(deg){
  let next = ((deg % 360) + 540) % 360 - 180;
  if(Math.abs(next) < ROTATION_SNAP_DEG) next = 0;
  TILE_MAP.rotation = next;
  scheduleTileRender();
}

function resetMapRotation(){
  TILE_MAP.rotation = 0;
  scheduleTileRender();
}

function scheduleTileRender(){
  if(tileRenderRaf) return;
  tileRenderRaf = requestAnimationFrame(()=>{
    tileRenderRaf = 0;
    renderTileMap();
  });
}

function stopFastPan(){
  if(!TILE_MAP.isPanning) return;
  TILE_MAP.isPanning = false;
  const overlay = document.getElementById("tm-overlay");
  if(overlay) overlay.style.transform = "";
  scheduleTileRender();
}

function setTileZoom(nextZoom){
  TILE_MAP.zoom = clamp(nextZoom, TILE_MAP.minZoom, TILE_MAP.maxZoom);
  clampCenterToCrop();
  scheduleMapViewSave();
  scheduleTileRender();
}

function zoomInTileMap(){
  setTileZoom(TILE_MAP.zoom + 0.5);
}

function zoomOutTileMap(){
  setTileZoom(TILE_MAP.zoom - 0.5);
}

async function loadDefaultMapView(){
  if(loadSavedMapViewFromStorage()){
    scheduleTileRender();
    return;
  }
  try{
    const r = await fetch("/api/map-default-view");
    if(!r.ok) return;
    const parsed = await r.json();
    const z = Number(parsed && parsed.zoom);
    const lat = Number(parsed && parsed.center && parsed.center.lat);
    const lng = Number(parsed && parsed.center && parsed.center.lng);
    if(!Number.isFinite(z) || !Number.isFinite(lat) || !Number.isFinite(lng)) return;
    TILE_MAP.zoom = clamp(z, TILE_MAP.minZoom, TILE_MAP.maxZoom);
    TILE_MAP.center = { lat, lng };
    saveMapViewNow();
    scheduleTileRender();
  }catch{}
}

function initTileMap(){
  const wrap = document.getElementById("mv-wrap");
  if(!wrap) return;
  if(wrap.dataset.tileBound === "1") return;
  wrap.dataset.tileBound = "1";
  TILE_MAP.mounted = true;
  wrap.addEventListener("contextmenu",e=>e.preventDefault());
  wrap.addEventListener("dragstart",e=>e.preventDefault());
  wrap.addEventListener("selectstart",e=>e.preventDefault());

  wrap.addEventListener("pointerdown",e=>{
    if(e.target.closest(".mv-tool") || e.target.closest(".tm-zoom") || e.target.closest(".tm-compass")) return;
    tileTapStart = { x:e.clientX, y:e.clientY, moved:false, target:e.target };
    TILE_POINTERS.set(e.pointerId,{x:e.clientX,y:e.clientY});
    try{ wrap.setPointerCapture(e.pointerId); }catch{}
    if(TILE_POINTERS.size === 1){
      tilePanStart = {
        x: e.clientX,
        y: e.clientY,
        center: { ...TILE_MAP.center },
        rect: wrap.getBoundingClientRect()
      };
      TILE_MAP.isPanning = TILE_MAP.rotation === 0;
    } else if(TILE_POINTERS.size >= 2){
      stopFastPan();
    }
  });

  wrap.addEventListener("pointermove",e=>{
    if(!TILE_POINTERS.has(e.pointerId)) return;
    TILE_POINTERS.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(TILE_POINTERS.size === 2){
      stopFastPan();
      const [a,b] = [...TILE_POINTERS.values()];
      const cx = (a.x + b.x) / 2;
      const cy = (a.y + b.y) / 2;
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const angle = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
      if(!tilePanStart || !Number.isFinite(tilePanStart.pinchDist)){
        const rect = getTileGestureRect(wrap);
        const screenX = cx - rect.left;
        const screenY = cy - rect.top;
        const centerWorld = projectLatLng(TILE_MAP.center.lat, TILE_MAP.center.lng, TILE_MAP.zoom);
        const local = screenToMapDelta(screenX - wrap.clientWidth / 2, screenY - wrap.clientHeight / 2);
        const anchorWorldX = centerWorld.x + local.x;
        const anchorWorldY = centerWorld.y + local.y;
        const anchorLatLng = unprojectWorld(anchorWorldX, anchorWorldY, TILE_MAP.zoom);
        tilePanStart = {
          pinchDist: dist,
          startAngle: angle,
          startRotation: TILE_MAP.rotation,
          zoom: TILE_MAP.zoom,
          anchorLatLng,
          mode: null
        };
        if(tileTapStart) tileTapStart.moved = true;
        return;
      }
      if(tileTapStart) tileTapStart.moved = true;
      if(!tilePanStart.mode){
        const zoomMag = Math.abs(Math.log2(Math.max(1, dist) / Math.max(1, tilePanStart.pinchDist)));
        let angDiff = angle - tilePanStart.startAngle;
        angDiff = ((angDiff % 360) + 540) % 360 - 180;
        const rotMag = Math.abs(angDiff);
        const ZOOM_LOCK = 0.12;
        const ROT_LOCK = 8;
        if(zoomMag < ZOOM_LOCK && rotMag < ROT_LOCK) return;
        tilePanStart.mode = (zoomMag / ZOOM_LOCK) >= (rotMag / ROT_LOCK) ? "zoom" : "rotate";
        tilePanStart.pinchDist = dist;
        tilePanStart.startAngle = angle;
        tilePanStart.zoom = TILE_MAP.zoom;
        tilePanStart.startRotation = TILE_MAP.rotation;
      }
      const rect = getTileGestureRect(wrap);
      const screenX = cx - rect.left;
      const screenY = cy - rect.top;
      let nextZoom = tilePanStart.zoom;
      if(tilePanStart.mode === "zoom"){
        const zoomDelta = Math.log2(Math.max(1, dist) / Math.max(1, tilePanStart.pinchDist));
        nextZoom = clamp(tilePanStart.zoom + zoomDelta, TILE_MAP.minZoom, TILE_MAP.maxZoom);
      } else {
        let nextRotation = tilePanStart.startRotation + (angle - tilePanStart.startAngle);
        nextRotation = ((nextRotation % 360) + 540) % 360 - 180;
        if(Math.abs(nextRotation) < ROTATION_SNAP_DEG) nextRotation = 0;
        TILE_MAP.rotation = nextRotation;
      }
      const local = screenToMapDelta(screenX - wrap.clientWidth / 2, screenY - wrap.clientHeight / 2);
      const anchorWorld = projectLatLng(tilePanStart.anchorLatLng.lat, tilePanStart.anchorLatLng.lng, nextZoom);
      const nextCenterWorldX = anchorWorld.x - local.x;
      const nextCenterWorldY = anchorWorld.y - local.y;
      TILE_MAP.zoom = nextZoom;
      const size = worldSize(nextZoom);
      TILE_MAP.center = unprojectWorld(nextCenterWorldX, clamp(nextCenterWorldY, 0, size), nextZoom);
      clampCenterToCrop();
      scheduleMapViewSave();
      scheduleTileRender();
      return;
    }
    if(TILE_POINTERS.size !== 1 || !tilePanStart || !Number.isFinite(tilePanStart.x)) return;
    const dxRaw = e.clientX - tilePanStart.x;
    const dyRaw = e.clientY - tilePanStart.y;
    if(tileTapStart && (Math.abs(e.clientX - tileTapStart.x) > 4 || Math.abs(e.clientY - tileTapStart.y) > 4)){
      tileTapStart.moved = true;
    }
    const local = screenToMapDelta(dxRaw, dyRaw);
    const z = TILE_MAP.zoom;
    const startWorld = projectLatLng(tilePanStart.center.lat, tilePanStart.center.lng, z);
    const nextWorldX = startWorld.x - local.x;
    const nextWorldY = startWorld.y - local.y;
    const size = worldSize(z);
    const clampedY = clamp(nextWorldY, 0, size);
    TILE_MAP.center = unprojectWorld(nextWorldX, clampedY, z);
    if(TILE_MAP.isPanning){
      const overlay = document.getElementById("tm-overlay");
      if(overlay) overlay.style.transform = `translate(${local.x}px, ${local.y}px)`;
    }
    scheduleMapViewSave();
    scheduleTileRender();
  });

  const endPointer = e=>{
    const hadPointer = TILE_POINTERS.has(e.pointerId);
    if(!hadPointer) return;
    const tap = tileTapStart && !tileTapStart.moved;
    const target = (tileTapStart && tileTapStart.target) || e.target;
    TILE_POINTERS.delete(e.pointerId);
    try{ wrap.releasePointerCapture(e.pointerId); }catch{}
    if(TILE_POINTERS.size === 1){
      const [rest] = [...TILE_POINTERS.values()];
      tilePanStart = {
        x: rest.x,
        y: rest.y,
        center: { ...TILE_MAP.center },
        rect: wrap.getBoundingClientRect()
      };
    } else if(TILE_POINTERS.size === 0){
      tilePanStart = null;
      stopFastPan();
    }
    tileTapStart = null;
    if(!tap) return;
    if(target.closest(".mv-tool") || target.closest(".tm-zoom") || target.closest(".tm-compass")) return;
    if(target.closest("[data-close]")) { mvClosePopup(); return; }
    const marker = target.closest(".tm-pt");
    if(marker){
      const name = marker.getAttribute("data-ride");
      if(name) mvPickRide(name);
      return;
    }
    if(!target.closest(".mv-popup")) mvClosePopup();
  };
  wrap.addEventListener("pointerup",endPointer);
  wrap.addEventListener("pointercancel",endPointer);
  wrap.addEventListener("lostpointercapture",endPointer);
  wrap.addEventListener("wheel",e=>{
    e.preventDefault();
    if(e.ctrlKey || e.metaKey){
      const ZOOM_SENSITIVITY = 0.004;
      setTileZoom(TILE_MAP.zoom + (-e.deltaY * ZOOM_SENSITIVITY));
      return;
    }
    const z = TILE_MAP.zoom;
    const centerWorld = projectLatLng(TILE_MAP.center.lat, TILE_MAP.center.lng, z);
    const local = screenToMapDelta(e.deltaX, e.deltaY);
    const nextWorldX = centerWorld.x + local.x;
    const nextWorldY = centerWorld.y + local.y;
    const size = worldSize(z);
    TILE_MAP.center = unprojectWorld(nextWorldX, clamp(nextWorldY, 0, size), z);
    scheduleMapViewSave();
    scheduleTileRender();
  },{passive:false});
}

async function fetchLive(){
  if(liveRequest)return liveRequest;
  set({ld:true});
  liveRequest=(async()=>{
    try{
      const r=await fetch("/api/live");
      if(!r.ok)throw new Error("live");
      const data=await r.json();
      lastLiveFetchAt=Date.now();
      set({
        live:data.rides||{},
        liveSource:data.source||"Live",
        liveFallback:!!data.fallback,
        upd:new Date(data.updated_at||Date.now()),
        err:null,
        ld:false
      });
      fetch("/api/baseline").then(r=>r.ok?r.json():null).then(base=>{
        if(base)set({base,baseType:base.day_type});
      }).catch(()=>{});
      fetchWeather();
    }catch{
      set({err:"Live недоступны",ld:false});
    }finally{
      liveRequest=null;
      scheduleAutoRefresh();
    }
  })();
  return liveRequest;
}

async function fetchWeather(){
  try{
    const r=await fetch("/api/weather");
    if(!r.ok)return;
    const w=await r.json();
    if(w&&(w.code!=null||w.temp!=null))set({weather:w});
  }catch{}
}

function refreshLiveIfStale(force=false){
  const staleFor=Date.now()-lastLiveFetchAt;
  if(force||!lastLiveFetchAt||staleFor>=LIVE_AUTO_REFRESH_MS){
    fetchLive();
    return;
  }
  scheduleAutoRefresh();
}

function scheduleAutoRefresh(){
  if(autoRefreshTimer){
    clearTimeout(autoRefreshTimer);
    autoRefreshTimer=null;
  }
  if(document.hidden)return;
  const delay=Math.max(0,LIVE_AUTO_REFRESH_MS-(Date.now()-lastLiveFetchAt));
  autoRefreshTimer=setTimeout(()=>refreshLiveIfStale(),delay||LIVE_AUTO_REFRESH_MS);
}

function initAutoRefresh(){
  const onResume=()=>refreshLiveIfStale();
  document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
      if(autoRefreshTimer){
        clearTimeout(autoRefreshTimer);
        autoRefreshTimer=null;
      }
      return;
    }
    onResume();
  });
  window.addEventListener("focus",onResume);
  window.addEventListener("pageshow",onResume);
}

// ── Pull to refresh ────────────────────────────────────────────────────────
function initPullToRefresh(){
  const THRESHOLD=70, MAX=110;
  let startY=null, dy=0, active=false, busy=false;

  const getScrollTop=()=>window.scrollY||document.documentElement.scrollTop||0;

  document.addEventListener("touchstart",e=>{
    if(S.weatherOpen)return;
    if(busy)return;
    if(e.target.closest(".mv-wrap"))return;
    if(getScrollTop()>0)return;
    startY=e.touches[0].clientY;
    dy=0;active=false;
  },{passive:true});

  document.addEventListener("touchmove",e=>{
    if(S.weatherOpen)return;
    if(startY===null||busy)return;
    dy=e.touches[0].clientY-startY;
    if(dy<=0){if(active){active=false;updatePtr(0,false)}return}
    if(!active&&dy>8)active=true;
    if(!active)return;
    const pull=Math.min(MAX,dy*0.5);
    updatePtr(pull,pull>=THRESHOLD);
  },{passive:true});

  document.addEventListener("touchend",()=>{
    if(S.weatherOpen){startY=null;dy=0;active=false;return}
    if(startY===null){return}
    const wasReady=dy*0.5>=THRESHOLD;
    startY=null;dy=0;
    if(!active){active=false;return}
    active=false;
    if(wasReady&&!busy){
      busy=true;
      const ptr=document.getElementById("ptr");
      ptr.classList.add("spn");
      ptr.classList.remove("rdy");
      ptr.querySelector(".tx").textContent="Обновляем...";
      ptr.style.transform="translateY(0)";
      fetchLive().finally(()=>{
        setTimeout(()=>{
          busy=false;
          ptr.classList.remove("spn");
          ptr.querySelector(".tx").textContent="Потяните, чтобы обновить";
          updatePtr(0,false);
        },300);
      });
    } else {
      updatePtr(0,false);
    }
  });

  function updatePtr(pull,ready){
    const ptr=document.getElementById("ptr");
    if(!ptr)return;
    ptr.classList.toggle("act",pull>0);
    ptr.classList.toggle("rdy",ready);
    ptr.querySelector(".tx").textContent=ready?"Отпустите для обновления":"Потяните, чтобы обновить";
    ptr.style.transform=`translateY(${pull-60}px)`;
  }
}

function attachWeatherDrag(){
  const wmo=document.querySelector(".wmo");
  const wmc=document.querySelector(".wmc");
  if(!wmc||wmc.dataset.dragBound)return;
  wmc.dataset.dragBound="1";
  let startY=null,startX=null,dy=0,dragging=false,decided=false;
  const DISMISS_PX=110;
  const DISMISS_VELOCITY=0.6;
  let lastY=0,lastT=0,velocity=0;
  const setOffset=(y)=>{
    wmc.style.transform=`translateY(${y}px)`;
    if(wmo){
      const k=Math.max(0,Math.min(1,y/300));
      wmo.style.backgroundColor=`rgba(3,6,12,${(0.62*(1-k)).toFixed(3)})`;
    }
  };
  const reset=(animate)=>{
    if(animate){wmc.classList.remove("dragging");}
    wmc.style.transform="";
    if(wmo)wmo.style.backgroundColor="";
  };
  wmc.addEventListener("touchstart",e=>{
    if(e.touches.length!==1)return;
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    lastY=startY;lastT=e.timeStamp;velocity=0;
    dy=0;dragging=false;decided=false;
  },{passive:true});
  wmc.addEventListener("touchmove",e=>{
    if(startY===null)return;
    const y=e.touches[0].clientY;
    const x=e.touches[0].clientX;
    const ady=y-startY;
    const adx=x-startX;
    if(!decided){
      if(Math.abs(adx)>Math.abs(ady)&&Math.abs(adx)>8){startY=null;return}
      if(Math.abs(ady)<6)return;
      decided=true;
      if(ady>0&&wmc.scrollTop<=0){
        dragging=true;
        wmc.classList.add("dragging");
      }else{
        startY=null;return;
      }
    }
    if(!dragging)return;
    const dt=e.timeStamp-lastT;
    if(dt>0)velocity=(y-lastY)/dt;
    lastY=y;lastT=e.timeStamp;
    dy=Math.max(0,ady);
    if(e.cancelable)e.preventDefault();
    setOffset(dy);
  },{passive:false});
  const finish=()=>{
    if(startY===null){return}
    const wasDragging=dragging;
    const finalDy=dy;
    const finalV=velocity;
    startY=null;dy=0;dragging=false;decided=false;
    if(!wasDragging)return;
    wmc.classList.remove("dragging");
    if(finalDy>=DISMISS_PX||finalV>=DISMISS_VELOCITY){
      const target=Math.max(finalDy,wmc.offsetHeight);
      wmc.style.transform=`translateY(${target}px)`;
      if(wmo)wmo.style.backgroundColor="rgba(3,6,12,0)";
      setTimeout(()=>{reset(false);closeWeatherModal()},220);
    }else{
      reset(true);
    }
  };
  wmc.addEventListener("touchend",finish,{passive:true});
  wmc.addEventListener("touchcancel",finish,{passive:true});
}

function solve3(A,b){
  const M=A.map((row,i)=>row.slice().concat(b[i]));
  for(let col=0;col<3;col++){
    let pivot=col;
    for(let r=col+1;r<3;r++)if(Math.abs(M[r][col])>Math.abs(M[pivot][col]))pivot=r;
    if(Math.abs(M[pivot][col])<1e-12)return null;
    [M[col],M[pivot]]=[M[pivot],M[col]];
    const p=M[col][col];
    for(let j=col;j<4;j++)M[col][j]/=p;
    for(let r=0;r<3;r++){
      if(r===col)continue;
      const f=M[r][col];
      for(let j=col;j<4;j++)M[r][j]-=f*M[col][j];
    }
  }
  return M.map(row=>row[3]);
}

function calibrationModel(){
  const source=DEFAULT_CALIBRATION_POINTS;
  const lat0=source.reduce((sum,p)=>sum+p.lat,0)/source.length;
  const Rm=6371000;
  const cos0=Math.cos(lat0*Math.PI/180);
  const points=source.map(p=>{
    const x=(p.lng*Math.PI/180)*Rm*cos0;
    const y=(p.lat*Math.PI/180)*Rm;
    return {x,y,mx:p.mx,my:p.my};
  });
  const XT_X=[[0,0,0],[0,0,0],[0,0,0]], XT_mx=[0,0,0], XT_my=[0,0,0];
  points.forEach(p=>{
    const row=[p.x,p.y,1];
    for(let i=0;i<3;i++){
      XT_mx[i]+=row[i]*p.mx;
      XT_my[i]+=row[i]*p.my;
      for(let j=0;j<3;j++)XT_X[i][j]+=row[i]*row[j];
    }
  });
  const ax=solve3(XT_X,XT_mx), ay=solve3(XT_X,XT_my);
  if(!ax||!ay)return null;
  const det=ax[0]*ay[1]-ax[1]*ay[0];
  if(Math.abs(det)<1e-12)return null;
  return {lat0,cos0,ax,ay,det};
}

function calibrationPredict(mx,my){
  const model=calibrationModel();
  if(!model)return null;
  const {ax,ay,det,cos0}=model;
  const x=((mx-ax[2])*ay[1]-ax[1]*(my-ay[2]))/det;
  const y=(ax[0]*(my-ay[2])-ay[0]*(mx-ax[2]))/det;
  const lat=(y/6371000)*(180/Math.PI);
  const lng=(x/(6371000*cos0))*(180/Math.PI);
  return {lat,lng,mx,my};
}

function calibrationProject(lat,lng){
  const model=calibrationModel();
  if(!model)return null;
  const {ax,ay,cos0}=model;
  const x=(lng*Math.PI/180)*6371000*cos0;
  const y=(lat*Math.PI/180)*6371000;
  return {mx:ax[0]*x+ax[1]*y+ax[2],my:ay[0]*x+ay[1]*y+ay[2],lat,lng};
}

function requestUserLocation(){
  if(GEO_TEST_OVERRIDE.enabled){
    const lat = GEO_TEST_OVERRIDE.lat;
    const lng = GEO_TEST_OVERRIDE.lng;
    if(!isPointInCropBounds(lat,lng)){
      set({userPos:null,geoBusy:false});
      setGeoMsg("Вы вне зоны карты");
      return;
    }
    TILE_MAP.center = { lat, lng };
    clampCenterToCrop();
    set({userPos:{lat,lng},userPosAt:Date.now(),userHeading:GEO_TEST_OVERRIDE.heading,geoBusy:false});
    setGeoMsg("Тестовый режим геолокации");
    if(userPosTimer)clearTimeout(userPosTimer);
    userPosTimer=setTimeout(()=>{userPosTimer=null;set({userPos:null,userPosAt:null,userHeading:null})},USER_POS_TTL_MS);
    scheduleTileRender();
    return;
  }
  if(!navigator.geolocation){
    alert("Геолокация недоступна");
    return;
  }
  set({geoBusy:true,geoMsg:null});
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    if(!isPointInCropBounds(lat,lng)){
      set({userPos:null,geoBusy:false});
      setGeoMsg("Вы вне зоны карты");
      return;
    }
    TILE_MAP.center = { lat, lng };
    clampCenterToCrop();
    saveMapViewNow();
    const gpsHeading = Number.isFinite(pos.coords.heading) ? pos.coords.heading : null;
    set({userPos:{lat,lng},userPosAt:Date.now(),userHeading:gpsHeading,geoBusy:false});
    setGeoMsg(null);
    startHeadingTracking();
    if(userPosTimer)clearTimeout(userPosTimer);
    userPosTimer=setTimeout(()=>{userPosTimer=null;set({userPos:null,userPosAt:null,userHeading:null})},USER_POS_TTL_MS);
    scheduleTileRender();
  },()=>{
    set({geoBusy:false});
    setGeoMsg(null);
    alert("Не удалось получить геолокацию");
  },{enableHighAccuracy:true,timeout:10000,maximumAge:15000});
}

// ── Map view (pan + pinch zoom) ────────────────────────────────────────────
function mvApply(){
  const s=document.getElementById("mv-scene");
  if(!s)return;
  s.style.transform=`translate(${MV.tx}px,${MV.ty}px) scale(${MV.scale})`;
  mvPositionPopup();
}

function mvPositionPopup(){
  const pop=document.getElementById("mv-popup");
  if(!pop)return;
  const wrap=document.getElementById("mv-wrap");
  const img=document.getElementById("mv-img");
  if(!wrap||!img)return;
  if(!img.naturalWidth){
    pop.style.visibility="hidden";
    img.addEventListener("load",mvPositionPopup,{once:true});
    return;
  }
  pop.style.visibility="visible";
  const mx=Number(pop.dataset.mx), my=Number(pop.dataset.my);
  const baseW=wrap.clientWidth;
  const baseH=img.naturalHeight*(baseW/img.naturalWidth);
  const px=MV.tx+(mx/100)*baseW*MV.scale;
  const py=MV.ty+(my/100)*baseH*MV.scale;
  const cw=wrap.clientWidth, ch=wrap.clientHeight;
  const pw=pop.offsetWidth, ph=pop.offsetHeight;
  const gap=16;
  const flipUp=py+gap+ph>ch-8;
  pop.classList.toggle("up",flipUp);
  pop.classList.toggle("down",!flipUp);
  const top=flipUp?Math.max(8,py-gap-ph):Math.min(ch-ph-8,py+gap);
  const left=Math.min(cw-pw-8,Math.max(8,px-pw/2));
  pop.style.top=top+"px";
  pop.style.left=left+"px";
  const arrow=pop.querySelector(".ar");
  if(arrow){
    const ax=Math.min(pw-14,Math.max(4,px-left-5));
    arrow.style.left=ax+"px";
  }
}

function mvClampPan(){
  const wrap=document.getElementById("mv-wrap");
  const img=document.getElementById("mv-img");
  if(!wrap||!img||!img.naturalWidth)return;
  const cw=wrap.clientWidth, ch=wrap.clientHeight;
  const iw=wrap.clientWidth*MV.scale;
  const ih=(img.naturalHeight*(wrap.clientWidth/img.naturalWidth))*MV.scale;
  const minX=Math.min(0,cw-iw), maxX=Math.max(0,cw-iw);
  const minY=Math.min(0,ch-ih), maxY=Math.max(0,ch-ih);
  MV.tx=Math.min(maxX,Math.max(minX,MV.tx));
  MV.ty=Math.min(maxY,Math.max(minY,MV.ty));
}

function mvZoomAt(cx,cy,factor){
  const wrap=document.getElementById("mv-wrap");
  if(!wrap)return;
  const r=wrap.getBoundingClientRect();
  const px=cx-r.left, py=cy-r.top;
  const ns=Math.min(5,Math.max(1,MV.scale*factor));
  const k=ns/MV.scale;
  MV.tx=px-(px-MV.tx)*k;
  MV.ty=py-(py-MV.ty)*k;
  MV.scale=ns;
  mvClampPan();
  mvApply();
}

function mvZoom(delta){
  const wrap=document.getElementById("mv-wrap");
  if(!wrap)return;
  const r=wrap.getBoundingClientRect();
  mvZoomAt(r.left+r.width/2,r.top+r.height/2,delta);
}

function mvReset(){
  MV.scale=1;MV.tx=0;MV.ty=0;
  mvApply();
}

function mvInit(){
  if(MV.ready)return;
  const wrap=document.getElementById("mv-wrap");
  if(!wrap)return;
  MV.ready=true;

  let pts=new Map(), startDist=0, startScale=1, panStart=null, moved=false, downTarget=null;

  wrap.addEventListener("pointerdown",e=>{
    if(e.target.closest(".mv-tool")||e.target.closest(".mv-tools"))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){
      moved=false;
      panStart={x:e.clientX-MV.tx,y:e.clientY-MV.ty};
      downTarget=e.target.closest(".mv-pt")||null;
    } else if(pts.size===2){
      const [a,b]=[...pts.values()];
      startDist=Math.hypot(a.x-b.x,a.y-b.y);
      startScale=MV.scale;
      panStart=null;
      downTarget=null;
    }
  });

  wrap.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1&&panStart){
      const nx=e.clientX-panStart.x, ny=e.clientY-panStart.y;
      if(!moved&&(Math.abs(nx-MV.tx)>3||Math.abs(ny-MV.ty)>3)){
        moved=true;
        try{wrap.setPointerCapture(e.pointerId)}catch{}
      }
      if(!moved)return;
      MV.tx=nx;MV.ty=ny;
      mvClampPan();mvApply();
    } else if(pts.size===2){
      const [a,b]=[...pts.values()];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(startDist>0){
        const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
        const ns=Math.min(5,Math.max(1,startScale*(d/startDist)));
        const k=ns/MV.scale;
        const r=wrap.getBoundingClientRect();
        const px=cx-r.left, py=cy-r.top;
        MV.tx=px-(px-MV.tx)*k;
        MV.ty=py-(py-MV.ty)*k;
        MV.scale=ns;
        mvClampPan();mvApply();
      }
      moved=true;
    }
  });

  wrap.addEventListener("pointerup",e=>{
    if(!pts.has(e.pointerId))return;
    if(!moved&&pts.size===1){
      const closeBtn=e.target.closest("[data-close]");
      const popup=e.target.closest(".mv-popup");
      if(closeBtn){mvClosePopup()}
      else if(downTarget){
        const name=downTarget.getAttribute("data-ride");
        if(name)mvPickRide(name);
      } else if(!popup){
        mvClosePopup();
      }
    }
    pts.delete(e.pointerId);
    if(pts.size<2)startDist=0;
    if(pts.size===0){panStart=null;downTarget=null}
  });
  wrap.addEventListener("pointercancel",e=>{
    pts.delete(e.pointerId);
    if(pts.size<2)startDist=0;
    if(pts.size===0){panStart=null;downTarget=null}
  });

  wrap.addEventListener("wheel",e=>{
    e.preventDefault();
    mvZoomAt(e.clientX,e.clientY,e.deltaY<0?1.15:1/1.15);
  },{passive:false});

}

function mvPickRide(name){
  set({msel:S.msel===name?null:name}, { silent: true });
  if(tg)tg.HapticFeedback?.impactOccurred?.("light");
}

function focusOnMap(name){
  const geo = rideGeoByName(name);
  if(!geo)return;
  set({tab:"map",msel:name,pf:"all",mrt:"all"});
  requestAnimationFrame(()=>{
    TILE_MAP.center = { lat: geo.lat, lng: geo.lng };
    clampCenterToCrop();
    scheduleTileRender();
  });
}

function tierMinStars(filter){

async function loadBaseline(dayType){
  set({bd:true});
  try{
    const r=await fetch(`/api/baseline?day_type=${dayType}`);

    set({base,baseType:base.day_type,bd:false});
  }catch{set({err:"История недоступна",bd:false})}
}

// ── Render ───────────────────────────────────────────────────────────────────
function effectiveWait(n,m,includeSingle){
  const lv=liveRide(n,m);
  if(!lv||!lv.is_open)return Infinity;
  let w=lv.wait_time;
  if(includeSingle){
    const slv=singleRide(n,m);
    if(slv&&slv.is_open)w=Math.min(w,slv.wait_time);
  }
  return w;
}

function rideWaitSort(entries,includeSingle){
  return entries.slice().sort((a,b)=>{
    const va=effectiveWait(a[0],a[1],includeSingle);
    const vb=effectiveWait(b[0],b[1],includeSingle);
    if(va!==vb)return va-vb;
    return "SABC".indexOf(a[1].t)-"SABC".indexOf(b[1].t);
  });
}

  if(S.tab==="plan"){
